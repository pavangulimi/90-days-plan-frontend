<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel</title>
    <style>
        thead,th,tbody,tr,td{
            border: solid red;
        }
        table{
            border-collapse: collapse;
        }
    </style>

</head>
<body>
    <table>
        <thead>
            <th>Name</th>
            <th >Age</th>
            <th>Brach</th>
        </thead>
        <tbody>
            <tr>
                <td colspan="3">pavan</td>
                <td rowspan="3">24</td>
                <td>ece</td>
            </tr>
            <tr>
                <td>kumar</td>
                <td>eee</td>
            </tr>
            <tr>
                <td>praveen</td>
                <td>cse</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
