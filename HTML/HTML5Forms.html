<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form >
        <label for="firstName">FirstName</label>
        <input type="text"  required placeholder="enter your firstname" id="firstName">
        <label for="phoneno">PhoneNumber</label>
        <input type="tel" pattern="[0-9]{10}" id="phoneno">
        <label for="age">Age</label>
        <input type="number" id="age" min="18" max="80">
        <label for="courses">Select Courses</label>
        <select name="courses" id="courses">
            <optgroup label="JavaFullStack">
                <option value="java">Java</option>
                <option value="springBoot">springBoot</option>
            </optgroup>
            <optgroup label=".netFullstack">
                <option value="c#">c#</option>
                <option value="c#Framework">c#Framework</option>
            </optgroup>
        </select>
        <p contenteditable="true"> This paragraph is used to edit the content in website</p>
        <input list="coursess" placeholder="select courses">
        <datalist id="coursess">
             <select name="coursess" id="coursess">
            <optgroup label="JavaFullStack">
                <option value="java">Java</option>
                <option value="springBoot">springBoot</option>
            </optgroup>
            <optgroup label=".netFullstack">
                <option value="c#">c#</option>
                <option value="c#Framework">c#Framework</option>
            </optgroup>
        </select>
        </datalist>
        <button>Submit</button>
    </form>
</body>
</html>
