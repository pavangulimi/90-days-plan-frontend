<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering Elements</title>
    <style>
        .login-container{
            width: 300px;
            height: 200px;
            background-color: #f1f1f1;
            border: 2px solid #0a0909d1;
            padding: 20px;
            margin: 100px auto; /* Center horizontally */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Center vertically */
            align-items: center; /* Center horizontally */
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center; /* Center form elements horizontally */
        }

        input {
            margin-bottom: 10px;
            padding: 5px;
            width: 80%;
        }

        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login Page</h1>
        <form >
            <lable for="username">Username:</lable><br>
            <input type="text"   placeholder="Enter Your name"  id="username"  ><br>
            <label for="password">Password:</label><br>
            <input type="password" placeholder="Enter Your Password" id="password"><br>
            <button type="submit">Login</button>
        </form>
    </div>
    

</body>
</html>
