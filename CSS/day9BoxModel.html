<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        #box1{
            width:300px;
            height:300px;
            border:2px solid black;
            padding:20px 0 0 20px; /* top right bottom left */
            border-radius:20px 20px 20px 20px;
            border-radius:50%;
            width:400px;
            height:400px
        }
        #box2{
            width:300px;
            height:300px;
            border:2px dashed black;
            padding:20px 0 0 20px; /* top right bottom left */
            margin:20px 0 0 0; /* top right bottom left */
            outline:2px solid red;
            outline-offset:10px ;/* top right bottom left */
        }
             
    </style>
</head>
<body>
    <div id="box1">
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
    </div>
    <div id="box2">
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
        <p>This is a paragraph inside a div.</p>
    </div>
</body>
</html>
